<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akshara Alchemist - Integrated Edition</title>
    <style>
        :root { --bg: #0f172a; --blue: #38bdf8; --gold: #fbbf24; --white: #f1f5f9; --green: #4ade80; --red: #ef4444; }
        * { box-sizing: border-box; touch-action: none; -webkit-user-select: none; } 
        
        body { 
            height: 100vh; margin: 0; overflow: hidden; background: var(--bg); color: var(--white);
            font-family: sans-serif; display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 420px; height: 100%; display: flex; flex-direction: column; padding: 10px; }
        header { text-align: center; height: 12%; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .timer { font-family: monospace; font-size: 1.2rem; color: var(--gold); margin-top: 5px; font-weight: bold; }
        
        #goal-area { text-align: center; height: 12%; display: flex; align-items: center; justify-content: center; }
        #target-text { color: var(--gold); font-size: 2.2rem; font-weight: bold; border-bottom: 3px solid #334155; }

        .game-grid { display: grid; grid-template-columns: 80px 1fr 80px; gap: 10px; height: 50%; align-items: center; }
        .bank { background: rgba(255,255,255,0.05); border: 1px solid var(--blue); border-radius: 12px; height: 95%; display: flex; flex-direction: column; align-items: center; padding: 5px; gap: 8px; overflow-y: auto; }
        .bank h3 { font-size: 0.6rem; margin: 2px; color: var(--blue); }

        .forge-zone { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #forge-circle { width: 110px; height: 110px; border: 4px dashed var(--gold); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 3rem; background: rgba(251,191,36,0.05); transition: all 0.2s; }

        .shake { animation: shake 0.4s; border-color: var(--red) !important; background: rgba(239, 68, 68, 0.2) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        .tile { width: 60px; height: 60px; background: white; color: #1e293b; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; font-weight: bold; box-shadow: 0 4px 0 #94a3b8; flex-shrink: 0; }
        .tile.m { background: var(--gold); box-shadow: 0 4px 0 #b45309; }

        #msg { font-size: 0.8rem; color: var(--green); margin-top: 10px; height: 15px; font-weight: bold; text-align: center; }
        #next-btn { padding: 10px 20px; background: var(--green); border: none; border-radius: 30px; font-weight: bold; color: #0f172a; margin-top: 5px; cursor: pointer; }
        .hidden { display: none !important; }
        
        #tray-area { height: 15%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .word-tray { display: flex; gap: 8px; }
        .slot { width: 65px; height: 65px; border: 2px dashed #475569; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; background: rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="timer">⏱️ <span id="clock">00:00</span></div>
        <select id="lvl" onchange="start()" style="background:#1e293b; color:white; border:1px solid var(--blue); padding: 2px 5px; font-size: 0.8rem;">
            <option value="1">Level 1: Fusion Lab</option>
            <option value="2">Level 2: Word Smith</option>
        </select>
    </header>

    <div id="goal-area"><div id="target-text">लोडिंग...</div></div>

    <div class="game-grid">
        <div class="bank" id="v-bank"></div>
        <div class="forge-zone">
            <div id="forge-circle" ondragover="e=>e.preventDefault()" ondrop="handleDrop(event)">?</div>
            <div id="msg">Drag a Vyanjan</div>
            <button id="next-btn" class="hidden" onclick="moveNext()">Next →</button>
        </div>
        <div class="bank" id="m-bank"></div>
    </div>

    <div id="tray-area" class="hidden"><div class="word-tray" id="word-tray"></div></div>
</div>

<script>
    let bridge = { v: "", m: "", draggingType: "", draggingVal: "" };
    let timer = 0, clockInterval = null, idx = 0;

    function playSound(type) {
        const context = new (window.AudioContext || window.webkitAudioContext)();
        const osc = context.createOscillator();
        const gain = context.createGain();
        if (type === 'success') {
            osc.frequency.setValueAtTime(523, context.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, context.currentTime + 0.1);
        } else {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(120, context.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, context.currentTime + 0.2);
        }
        osc.connect(gain); gain.connect(context.destination);
        osc.start(); osc.stop(context.currentTime + 0.3);
    }

    // UPDATED DATA: Imported from our 124-word Picture Match Game
    const level1Data = [
        {t:"ना", v:["न", "म"], m:["ा", "ि"]}, // From अनार
        {t:"मि", v:["म", "न"], m:["ि", "ी"]}, // From इमली
        {t:"के", v:["क", "ब"], m:["े", "ै"]}, // From केला
        {t:"से", v:["स", "ह"], m:["े", "ै"]}, // From सेब
        {t:"ली", v:["ल", "छ"], m:["ि", "ी"]}  // From मछली
    ];

    const level2Data = [
        {w:"अनार", p:["अ", "ना", "र"], v:["न", "र"], m:["ा"]},
        {w:"इमली", p:["इ", "म", "ली"], v:["म", "ल"], m:["ी"]},
        {w:"केला", p:["के", "ला"], v:["क", "ल"], m:["े", "ा"]},
        {w:"बाघ", p:["बा", "घ"], v:["ब", "घ"], m:["ा"]},
        {w:"मछली", p:["म", "छ", "ली"], v:["म", "छ", "ल"], m:["ी"]}
    ];

    function start() {
        idx = 0; if(clockInterval) clearInterval(clockInterval);
        timer = 0; clockInterval = setInterval(() => {
            timer++; let m = Math.floor(timer/60).toString().padStart(2,'0');
            let s = (timer%60).toString().padStart(2,'0');
            document.getElementById('clock').innerText = `${m}:${s}`;
        }, 1000);
        load();
    }

    function load() {
        const lvl = document.getElementById('lvl').value;
        const d = (lvl == "1") ? level1Data[idx] : level2Data[idx];
        document.getElementById('target-text').innerText = (lvl == "1") ? d.t : d.w;
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('msg').innerText = "Drag a Vyanjan";
        bridge.v = ""; bridge.m = "";
        document.getElementById('forge-circle').innerText = "?";

        document.getElementById('v-bank').innerHTML = "<h3>VYANJAN</h3>";
        d.v.forEach(v => document.getElementById('v-bank').innerHTML += `<div class="tile" draggable="true" ondragstart="handleDragStart('${v}','v')">${v}</div>`);
        
        document.getElementById('m-bank').innerHTML = "<h3>MATRA</h3>";
        d.m.forEach(m => document.getElementById('m-bank').innerHTML += `<div class="tile m" draggable="true" ondragstart="handleDragStart('${m}','m')">${m}</div>`);

        const trayArea = document.getElementById('tray-area');
        const tray = document.getElementById('word-tray');
        if(lvl == "2") {
            trayArea.classList.remove('hidden'); tray.innerHTML = "";
            d.p.forEach(part => {
                // If the part is a base vowel (like अ or इ), it doesn't need forging
                const isBase = (part === "अ" || part === "इ" || part === "म" || part === "र" || part === "घ" || part === "छ");
                tray.innerHTML += `<div class="slot" ondragover="e=>e.preventDefault()" ondrop="handleTrayDrop(event, '${part}', ${isBase})">?</div>`;
            });
        } else trayArea.classList.add('hidden');
    }

    function handleDragStart(val, type) { bridge.draggingVal = val; bridge.draggingType = type; }

    function handleDrop(e) {
        e.preventDefault(); const circle = document.getElementById('forge-circle'); circle.classList.remove('shake');
        if (bridge.draggingType === 'v') {
            bridge.v = bridge.draggingVal; bridge.m = ""; circle.innerText = bridge.v;
            document.getElementById('msg').innerText = "Now add Matra";
        } else if (bridge.draggingType === 'm' && bridge.v !== "") {
            bridge.m = bridge.draggingVal; circle.innerText = bridge.v + bridge.m;
            if (document.getElementById('lvl').value == "1") {
                if (circle.innerText === level1Data[idx].t) victory();
                else triggerError(circle, true);
            }
        }
    }

    function handleTrayDrop(e, target, isBase) {
        e.preventDefault();
        // If it's a base letter, student can drag vyanjan directly. If it's a combo, they need the forge.
        const val = isBase ? bridge.draggingVal : (bridge.v + bridge.m);
        
        if (val === target) {
            e.target.innerText = val; e.target.style.background = "rgba(74, 222, 128, 0.2)"; e.target.style.borderColor = "var(--green)";
            const slots = [...document.querySelectorAll('.slot')];
            if (slots.every(s => s.innerText !== "?")) victory();
            else { bridge.v = ""; bridge.m = ""; document.getElementById('forge-circle').innerText = "?"; }
        } else {
            triggerError(e.target, true); document.getElementById('msg').innerText = "Failed! Try again.";
        }
    }

    function triggerError(el, wipe) {
        playSound('error'); el.classList.add('shake');
        setTimeout(() => {
            el.classList.remove('shake');
            if(wipe) { bridge.v = ""; bridge.m = ""; document.getElementById('forge-circle').innerText = "?"; }
        }, 400);
    }

    function victory() { playSound('success'); document.getElementById('msg').innerText = "Shabash!"; document.getElementById('next-btn').classList.remove('hidden'); }
    function moveNext() { idx++; const max = (document.getElementById('lvl').value == "1") ? level1Data.length : level2Data.length; if(idx >= max) idx = 0; load(); }
    start();
</script>
</body>
</html>
